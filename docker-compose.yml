version: "3.8"

services:
  temu-audit:
    build: .
    container_name: temu-audit
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
      - ./chat.db:/app/chat.db
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - COZE_BOT_ID=${COZE_BOT_ID:-}
      - COZE_TOKEN=${COZE_TOKEN:-}
      - AUDIT_PRICE_CENTS=${AUDIT_PRICE_CENTS:-499}
      - AUDIT_PRICE_CURRENCY=${AUDIT_PRICE_CURRENCY:-usd}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
